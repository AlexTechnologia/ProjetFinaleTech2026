<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeilCraft! — Survie Multijoueur</title>
  <meta name="description" content="VeilCraft est un jeu de survie multijoueur en navigateur. Récoltez des ressources, craftez des outils, et survivez aux vagues nocturnes avec vos amis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7c3aed;
      --accent2: #a855f7;
      --accent3: #06b6d4;
      --glow: rgba(124,58,237,0.5);
      --glow2: rgba(168,85,247,0.4);
      --glass-bg: rgba(15,10,35,0.65);
      --glass-border: rgba(124,58,237,0.3);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Outfit', sans-serif;
      background: #020010;
      color: var(--text);
      overflow: hidden;
    }

    /* ── Canvas background ───────────────────────────────────────── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Animated gradient mesh ──────────────────────────────────── */
    .gradient-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(124,58,237,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(6,182,212,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(168,85,247,0.08) 0%, transparent 70%);
      animation: meshShift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes meshShift {
      0%   { transform: scale(1) rotate(0deg); opacity: 1; }
      50%  { transform: scale(1.05) rotate(1deg); opacity: 0.9; }
      100% { transform: scale(1) rotate(-0.5deg); opacity: 1; }
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    /* ── Logo ────────────────────────────────────────────────────── */
    .logo-wrap {
      text-align: center;
      animation: fadeDown 0.8s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-30px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .logo-title {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 30%, #06b6d4 70%, #a78bfa 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientFlow 5s ease infinite;
      filter: drop-shadow(0 0 30px rgba(124,58,237,0.6));
    }
    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .logo-rune {
      display: inline-block;
      font-size: clamp(3rem, 8vw, 6rem);
      filter: drop-shadow(0 0 20px #7c3aed);
      animation: runeFloat 3s ease-in-out infinite;
      -webkit-text-fill-color: #a78bfa;
    }
    @keyframes runeFloat {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    .logo-subtitle {
      margin-top: 0.4rem;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: pulseText 3s ease-in-out infinite;
    }
    @keyframes pulseText {
      0%,100% { opacity: 0.7; }
      50% { opacity: 1; color: #a78bfa; }
    }

    .logo-badge {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.25rem 0.9rem;
      background: rgba(124,58,237,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: #a78bfa;
      text-transform: uppercase;
    }

    /* ── Glass card ──────────────────────────────────────────────── */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.1),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeUp 0.8s 0.2s cubic-bezier(.16,1,.3,1) both;
      width: 100%;
      max-width: 440px;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.7rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(.16,1,.3,1);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::before { opacity: 1; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(124,58,237,0.5), 0 4px 20px rgba(124,58,237,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(124,58,237,0.8), 0 8px 30px rgba(124,58,237,0.5);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: rgba(124,58,237,0.12);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.35);
    }
    .btn-secondary:hover {
      background: rgba(124,58,237,0.25);
      border-color: rgba(124,58,237,0.7);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(124,58,237,0.25);
    }

    .btn-solo {
      background: rgba(6,182,212,0.12);
      color: #67e8f9;
      border: 1px solid rgba(6,182,212,0.35);
    }
    .btn-solo:hover {
      background: rgba(6,182,212,0.25);
      border-color: rgba(6,182,212,0.7);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(6,182,212,0.2);
    }

    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.35);
    }
    .btn-danger:hover {
      background: rgba(239,68,68,0.3);
    }

    .btn-sm {
      padding: 0.55rem 1rem;
      font-size: 0.85rem;
      border-radius: 9px;
    }

    .btn-icon { font-size: 1.1rem; }
    .menu-buttons { display: flex; flex-direction: column; gap: 0.75rem; }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      margin: 0.25rem 0;
      color: var(--text-dim);
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), transparent);
    }

    /* ── Modal overlay ───────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: rgba(10,5,30,0.95);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 0 0 1px rgba(124,58,237,0.1), 0 30px 80px rgba(0,0,0,0.7);
      animation: modalIn 0.3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform: scale(0.9) translateY(10px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 1.3rem; font-weight: 700;
      margin-bottom: 1.5rem;
      color: #c4b5fd;
    }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none;
      color: var(--text-dim); font-size: 1.4rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .modal-close:hover { color: #fff; }

    /* ── Room code display ───────────────────────────────────────── */
    .room-code-display {
      display: flex; align-items: center; gap: 0.6rem;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.35);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }

    .room-code-value {
      flex: 1;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: #a78bfa;
      text-shadow: 0 0 20px rgba(167,139,250,0.5);
      font-variant-numeric: tabular-nums;
    }

    .copy-btn {
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      color: #a78bfa;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(124,58,237,0.4); }
    .copy-btn.copied { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.4); color: #86efac; }

    /* ── Input ───────────────────────────────────────────────────── */
    .input-group { margin-bottom: 1rem; }
    .input-label {
      display: block;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 0.4rem;
    }
    .input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input:focus {
      border-color: rgba(124,58,237,0.7);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .input::placeholder { color: rgba(148,163,184,0.4); letter-spacing: 3px; }

    /* ── Lobby player list ───────────────────────────────────────── */
    .lobby-section {
      width: 100%; max-width: 440px;
      animation: fadeUp 0.8s 0.35s cubic-bezier(.16,1,.3,1) both;
    }
    .lobby-title {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 0.6rem;
    }
    .player-list {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .player-chip {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 100px;
      padding: 0.35rem 0.8rem;
      font-size: 0.85rem; font-weight: 600;
      animation: chipIn 0.3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes chipIn {
      from { opacity:0; transform: scale(0.8); }
      to   { opacity:1; transform: scale(1); }
    }
    .player-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: dotPulse 2s ease infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity:1; }
      50% { opacity:0.5; }
    }
    .player-host-crown { font-size: 0.75rem; }

    /* ── Tech footer ─────────────────────────────────────────────── */
    .tech-footer {
      position: fixed; bottom: 1rem; left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(148,163,184,0.4);
      letter-spacing: 1px;
      animation: fadeUp 1s 0.5s both;
      z-index: 1;
    }
    .tech-footer span { color: rgba(124,58,237,0.6); }

    /* ── Status msg ──────────────────────────────────────────────── */
    .status-msg {
      font-size: 0.82rem;
      color: var(--text-dim);
      text-align: center;
      min-height: 1.2rem;
      transition: color 0.3s;
    }
    .status-msg.error { color: #fca5a5; }
    .status-msg.success { color: #86efac; }

    /* ── Spinner ─────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(124,58,237,0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Notification toast ──────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(10,5,30,0.95);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      font-size: 0.85rem; font-weight: 600;
      color: #a78bfa;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }

    /* responsive tweaks */
    @media (max-height: 680px) {
      .logo-title { font-size: 2.8rem; }
      .app { gap: 0.8rem; padding: 0.8rem; }
      .card { padding: 1.2rem 1.5rem; }
    }
  </style>
</head>
<body>

<!-- Animated gradient mesh -->
<div class="gradient-mesh"></div>

<!-- Particle canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- ═══════════════ HOST MODAL ═══════════════ -->
<div class="modal-overlay" id="host-modal">
  <div class="modal" style="position:relative;">
    <button class="modal-close" onclick="closeModal('host-modal')">✕</button>
    <div class="modal-title">🏰 Créer une partie</div>

    <p style="font-size:0.82rem;color:var(--text-dim);margin-bottom:0.8rem;">
      Partagez ce code avec vos amis pour qu'ils rejoignent votre partie.
    </p>

    <div class="room-code-display">
      <div class="room-code-value" id="host-code">------</div>
      <button class="copy-btn" id="copy-btn" onclick="copyRoomCode()">Copier</button>
    </div>

    <div class="player-list" id="host-player-list" style="margin-bottom:1rem;">
      <!-- populated dynamically -->
    </div>

    <div style="display:flex;gap:0.6rem;flex-direction:column;">
      <button class="btn btn-primary" id="host-start-btn" onclick="startHostGame()">
        <span class="btn-icon">▶</span> Commencer la partie
      </button>
      <button class="btn btn-danger btn-sm" onclick="closeModal('host-modal')">Annuler</button>
    </div>

    <div class="status-msg" id="host-status" style="margin-top:0.8rem;"></div>
  </div>
</div>

<!-- ═══════════════ JOIN MODAL ═══════════════ -->
<div class="modal-overlay" id="join-modal">
  <div class="modal" style="position:relative;">
    <button class="modal-close" onclick="closeModal('join-modal')">✕</button>
    <div class="modal-title">🔗 Rejoindre une partie</div>

    <div class="input-group">
      <label class="input-label" for="join-code-input">Code de la partie</label>
      <input
        class="input" id="join-code-input"
        type="text" maxlength="6"
        placeholder="XXXXXX"
        autocomplete="off"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
        onkeydown="if(event.key==='Enter')joinGame()"
      >
    </div>

    <div class="input-group">
      <label class="input-label" for="join-name-input">Votre pseudo</label>
      <input
        class="input" id="join-name-input"
        type="text" maxlength="16"
        placeholder="Aventurier"
        autocomplete="off"
        style="letter-spacing:1px;text-transform:none;"
      >
    </div>

    <button class="btn btn-primary" onclick="joinGame()">
      <span id="join-spinner" style="display:none;"><span class="spinner"></span></span>
      <span class="btn-icon">🔗</span> Rejoindre
    </button>
    <div class="status-msg" id="join-status" style="margin-top:0.8rem;"></div>
  </div>
</div>

<!-- ═══════════════ MAIN UI ═══════════════ -->
<div class="app">

  <!-- Logo -->
  <div class="logo-wrap">
    <div style="display:flex;align-items:center;justify-content:center;gap:0.3rem;">
      <span class="logo-rune">⚔️</span>
      <span class="logo-title">VeilCraft</span>
      <span class="logo-rune" style="animation-delay:1s;">🛡️</span>
    </div>
    <div class="logo-subtitle">Survie multijoueur dans un monde procédural</div>
    <div class="logo-badge">Alpha v0.1 — WebRTC P2P</div>
  </div>

  <!-- Name input (always visible) -->
  <div class="card" style="padding:1rem 1.5rem;max-width:440px;">
    <label class="input-label" for="main-name-input" style="text-align:left;display:block;margin-bottom:0.4rem;">Votre pseudo</label>
    <input
      class="input" id="main-name-input"
      type="text" maxlength="16"
      placeholder="Aventurier"
      autocomplete="off"
      style="letter-spacing:1px;text-transform:none;margin-bottom:0;"
      value=""
    >
  </div>

  <!-- Main buttons card -->
  <div class="card">
    <div class="menu-buttons">
      <button class="btn btn-primary" onclick="openHostModal()">
        <span class="btn-icon">🏰</span> Créer une partie
      </button>
      <button class="btn btn-secondary" onclick="openJoinModal()">
        <span class="btn-icon">🔗</span> Rejoindre une partie
      </button>
      <div class="divider">ou</div>
      <button class="btn btn-solo" onclick="startSolo()">
        <span class="btn-icon">🌙</span> Solo
      </button>
    </div>
  </div>

  <!-- Lobby: connected players (shown when in a lobby) -->
  <div class="lobby-section" id="lobby-section" style="display:none;">
    <div class="lobby-title">Joueurs connectés</div>
    <div class="player-list" id="lobby-player-list"></div>
  </div>

</div>

<!-- Tech footer -->
<div class="tech-footer">
  Technologie&nbsp;: <span>WebRTC</span> • <span>STUN/TURN</span> • <span>PeerJS</span> • <span>Three.js</span>
  &nbsp;&nbsp;|&nbsp;&nbsp; &copy; 2025 VeilCraft
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// PARTICLE SYSTEM
// ─────────────────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], nebulae = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    const count = Math.floor((W * H) / 3000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.2,
        alpha: Math.random(),
        speed: Math.random() * 0.0003 + 0.0001,
        phase: Math.random() * Math.PI * 2,
        drift: (Math.random() - 0.5) * 0.03,
        color: Math.random() > 0.85
          ? `hsl(${260 + Math.random()*60},80%,75%)`
          : '#fff'
      });
    }
    // Floating dust / nebulae blobs
    nebulae = [];
    for (let i = 0; i < 6; i++) {
      nebulae.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 80 + Math.random() * 200,
        alpha: 0.03 + Math.random() * 0.04,
        hue: 260 + Math.random() * 60,
        vx: (Math.random()-0.5)*0.08, vy: (Math.random()-0.5)*0.05
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t++;

    // Nebulae
    for (const n of nebulae) {
      const grad = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      grad.addColorStop(0, `hsla(${n.hue},70%,55%,${n.alpha})`);
      grad.addColorStop(1, `hsla(${n.hue},70%,55%,0)`);
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
      n.x += n.vx; n.y += n.vy;
      if (n.x < -n.r) n.x = W + n.r;
      if (n.x > W+n.r) n.x = -n.r;
      if (n.y < -n.r) n.y = H + n.r;
      if (n.y > H+n.r) n.y = -n.r;
    }

    // Stars
    for (const s of stars) {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x + Math.sin(t * 0.005 + s.phase) * 1.5, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
      s.y += s.drift * 0.2;
      if (s.y > H + 2) s.y = -2;
      if (s.y < -2) s.y = H + 2;
    }
  }

  function loop() { draw(); requestAnimationFrame(loop); }

  window.addEventListener('resize', () => { resize(); createStars(); });
  resize(); createStars(); loop();
})();

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let currentPeer = null;
let currentRoomCode = null;
let connectedPeers = [];
let localPlayerName = 'Aventurier';

// Colours for player chips
const PLAYER_COLORS = ['#a78bfa','#67e8f9','#86efac','#fbbf24','#f87171','#34d399','#fb923c','#e879f9'];

function getPlayerName() {
  return document.getElementById('main-name-input').value.trim() || 'Aventurier';
}

// ─────────────────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOM CODE GENERATOR
// ─────────────────────────────────────────────────────────────────────────────
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  if (id === 'host-modal' && currentPeer) {
    currentPeer.destroy();
    currentPeer = null;
    currentRoomCode = null;
    connectedPeers = [];
  }
}

// Click outside modal to close
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      const id = overlay.id;
      closeModal(id);
    }
  });
});

// ─────────────────────────────────────────────────────────────────────────────
// HOST MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openHostModal() {
  localPlayerName = getPlayerName();
  currentRoomCode = generateRoomCode();
  document.getElementById('host-code').textContent = currentRoomCode;
  document.getElementById('host-status').textContent = '';
  document.getElementById('host-status').className = 'status-msg';

  // Reset player list in modal
  const list = document.getElementById('host-player-list');
  list.innerHTML = buildPlayerChip(localPlayerName, true);

  openModal('host-modal');
  initHostPeer();
}

function initHostPeer() {
  const status = document.getElementById('host-status');
  status.innerHTML = '<span class="spinner"></span> Initialisation du serveur P2P…';
  status.className = 'status-msg';

  // PeerJS peer ID = room code prefix + suffix to avoid conflicts
  const peerId = 'vc_' + currentRoomCode;

  const peer = new Peer(peerId, {
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:3478' },
        { urls: 'stun:stun2.l.google.com:19302' },
      ]
    }
  });

  currentPeer = peer;
  connectedPeers = [];

  peer.on('open', id => {
    status.innerHTML = '✅ En attente de joueurs…';
    status.className = 'status-msg success';
    sessionStorage.setItem('vc_peer_id', id);
    sessionStorage.setItem('vc_room', currentRoomCode);
    sessionStorage.setItem('vc_mode', 'host');
    sessionStorage.setItem('vc_name', localPlayerName);
  });

  peer.on('connection', conn => {
    conn.on('open', () => {
      connectedPeers.push(conn);
      const peerName = conn.metadata?.name || 'Joueur';
      refreshHostPlayerList();
      status.innerHTML = `✅ ${connectedPeers.length + 1} joueur(s) connecté(s)`;
      status.className = 'status-msg success';
      showToast(`${peerName} a rejoint la partie!`);
    });
    conn.on('close', () => {
      connectedPeers = connectedPeers.filter(c => c !== conn);
      refreshHostPlayerList();
    });
    conn.on('error', () => {
      connectedPeers = connectedPeers.filter(c => c !== conn);
      refreshHostPlayerList();
    });
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      // Room code taken – generate new one
      currentRoomCode = generateRoomCode();
      document.getElementById('host-code').textContent = currentRoomCode;
      peer.destroy();
      initHostPeer();
    } else {
      status.innerHTML = '⚠️ Erreur réseau – mode solo disponible';
      status.className = 'status-msg error';
    }
  });
}

function refreshHostPlayerList() {
  const list = document.getElementById('host-player-list');
  let html = buildPlayerChip(localPlayerName, true);
  connectedPeers.forEach((c, i) => {
    const name = c.metadata?.name || `Joueur ${i+2}`;
    html += buildPlayerChip(name, false, i+1);
  });
  list.innerHTML = html;
}

function buildPlayerChip(name, isHost, idx = 0) {
  const color = PLAYER_COLORS[idx % PLAYER_COLORS.length];
  return `<div class="player-chip" style="border-color:${color}33;color:${color}">
    <div class="player-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
    ${isHost ? '<span class="player-host-crown">👑</span>' : ''}
    ${name}
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// HOST COPY CODE
// ─────────────────────────────────────────────────────────────────────────────
function copyRoomCode() {
  if (!currentRoomCode) return;
  navigator.clipboard.writeText(currentRoomCode).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copié!';
    btn.classList.add('copied');
    showToast('Code copié dans le presse-papiers!');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    showToast('Impossible de copier – faites-le manuellement: ' + currentRoomCode);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// START HOST GAME
// ─────────────────────────────────────────────────────────────────────────────
function initHostPeer() {
  // We no longer initialize PeerJS in index.html to avoid disconnects when transitioning.
  // We just show the UI.
  document.getElementById('host-status').textContent = "En attente de joueurs... (Rejoignez avec le code)";
  document.getElementById('host-status').className = 'status-msg success';
}

function startHostGame() {
  sessionStorage.setItem('vc_room', currentRoomCode);
  sessionStorage.setItem('vc_mode', 'host');
  sessionStorage.setItem('vc_name', localPlayerName);
  sessionStorage.setItem('vc_seed', Math.floor(Math.random() * 999999).toString());
  window.location.href = `game.html?mode=host&room=${currentRoomCode}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// JOIN MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openJoinModal() {
  document.getElementById('join-code-input').value = '';
  document.getElementById('join-name-input').value = getPlayerName();
  document.getElementById('join-status').textContent = '';
  document.getElementById('join-status').className = 'status-msg';
  document.getElementById('join-spinner').style.display = 'none';
  openModal('join-modal');
  setTimeout(() => document.getElementById('join-code-input').focus(), 100);
}

function joinGame() {
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  const name = document.getElementById('join-name-input').value.trim() || 'Aventurier';
  const status = document.getElementById('join-status');
  const spinner = document.getElementById('join-spinner');

  if (code.length !== 6) {
    status.textContent = '⚠️ Le code doit contenir 6 caractères.';
    status.className = 'status-msg error';
    return;
  }

  status.innerHTML = '<span class="spinner"></span> Connexion au lobby...';
  status.className = 'status-msg';
  spinner.style.display = 'inline';

  sessionStorage.setItem('vc_room', code);
  sessionStorage.setItem('vc_mode', 'join');
  sessionStorage.setItem('vc_name', name);

  setTimeout(() => {
    window.location.href = `game.html?mode=join&room=${code}`;
  }, 400);
}

// ─────────────────────────────────────────────────────────────────────────────
// SOLO
// ─────────────────────────────────────────────────────────────────────────────
function startSolo() {
  const name = getPlayerName();
  sessionStorage.setItem('vc_mode', 'solo');
  sessionStorage.setItem('vc_name', name);
  sessionStorage.setItem('vc_seed', Math.floor(Math.random() * 999999).toString());
  window.location.href = 'game.html?mode=solo';
}

// Restore name from session
window.addEventListener('DOMContentLoaded', () => {
  const savedName = sessionStorage.getItem('vc_name');
  if (savedName) {
    document.getElementById('main-name-input').value = savedName;
  }
});
</script>
</body>
